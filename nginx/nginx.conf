limit_req_zone $binary_remote_addr zone=api_query:10m rate=20r/m;

server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 16k;

        # Serve Next.js static export (trailingSlash: true produces dir/index.html)
        location / {
            try_files $uri $uri/index.html $uri.html =404;
        }

        # Proxy all API requests to FastAPI
        location /api/ {
            limit_req zone=api_query burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
    }

