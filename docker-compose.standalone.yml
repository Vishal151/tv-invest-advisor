services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${UID:-1001}
        APP_GID: ${GID:-1001}
    # host UID/GID alignment keeps bind-mounted chroma_db writable on Linux
    user: "${UID:-1001}:${GID:-1001}"
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - APP_ENV=production
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./data/pdfs:/app/data/pdfs:ro
    restart: unless-stopped
    healthcheck:
      # Liveness: any HTTP response counts, including the degraded 503 that
      # /api/health returns until the corpus is ingested (urlopen would raise on it)
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import http.client; c = http.client.HTTPConnection('localhost', 8000, timeout=5); c.request('GET', '/api/health'); c.getresponse()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
